# includes is used to include the desired template functions (see templates/includes.yaml)
includes:
  networkpolicy: true
  deployment: true
  statefulset: true
  service: true
  ingress: true
  envSecret: true
  envConfigMap: true
  # files is needed for mounted volumes (secrets or configmaps)
  files: true
  configFiles: true
  binaryFiles: true
  pvcs: true
  job: true
  cronjob: true
  servicemonitor: true
  externalRefs: true

# start common.ingress
ingresses:
  ingress-1:
    deploy: true
    ingressClassName: nginx
    rules:
      - host: myapp.cluster.local
        http:
          paths:
            - backend:
                serviceNameSuffix: component-1
                servicePort: http
              path: "/"
              pathType: "ImplementationSpecific"
        secretName:
          externalRef: app-secrets
    tls: {}
  ingress-2:
    deploy: true
    ingressClassName: nginx
    rules:
      - host: legacy.cluster.local
        http:
          paths:
            - backend:
                serviceNameSuffix: component-1
                servicePort: http
              path: "/"
              pathType: "ImplementationSpecific"
        secretName: my-existing-tls-secret
    tls:
      type: "existing"
# end common.ingress

# start common.networkpolicy
networkpolicy:
  deploy: true
# end common.networkpolicy

# start common.servicemonitor
servicemonitor:
  deploy: true
  basicAuth:
    enabled: true
    existingSecret:
      externalRef: app-secrets
    newSecret:
      username: username
      password: changeit
  endpoints:
    komponente:
      componentSelector:
        key: app.kubernetes.io/component
        value: komponente
# end common.servicemonitor

# start common.pvcs
pvcs:
  - name: name-of-pvc
# end common.pvcs

# externalRefs is a unified registry of external dependencies
externalRefs:
  - id: app-config
    kind: ConfigMap
    name: my-app-config
  - id: app-secrets
    kind: Secret
    name: my-app-secrets
    optional: true
  - id: shared-data
    kind: PersistentVolumeClaim
    name: shared-data-pvc
  # ExternalName service — mode: create renders a Service/ExternalName resource
  - id: ext-database
    kind: ExternalName
    mode: create
    externalName: db.prod.example.com
  # ExternalName with fullnameOverride and annotations
  - id: ext-cache
    kind: ExternalName
    mode: create
    externalName: cache.prod.example.com
    fullnameOverride: "redis-cache"
    annotations:
      service.beta.kubernetes.io/description: "External Redis cache"
  # ExternalName reference — points to an existing service, no resource created
  - id: partner-api
    kind: ExternalName
    mode: reference
    name: partner-api-gateway

secrets:
  data:
    registry:
      pullSecret:
        enabled: true
        name:
          externalRef: app-secrets

# components are a dictionary of single components to be configured
components:
  component-1:
    # start common.service
    services:
      service-1:
        deploy: true
        type: LoadBalancer
        loadBalancerIP: 10.0.0.0
        loadBalancerClass: test
        loadBalancerSourceRanges:
          - 10.0.0.0/8
    # end common.service
    # start common.networkpolicy
    networkpolicies:
      networkpolicy-1:
        policyTypes:
          - Ingress
          - Egress
        ingress:
          namespaceSelector:
          - matchLabels:
              kubernetes.io/metadata.name: namespace-1
          podSelector:
          - matchLabels:
              app.kubernetes.io/component: component-2
        egress:
          namespaceSelector:
          - matchLabels:
              kubernetes.io/metadata.name: namespace-1

    # end common.networkpolicy
    controller:
      deploy: true
      type: "Deployment"
      envFrom:
        - externalRef: app-config
        - externalRef: app-secrets
          optional: false
      hostAliases:
      - ip: "127.0.0.1"
        hostnames:
        - "foo.local"
        - "bar.local"
      - ip: "10.1.2.3"
        hostnames:
        - "foo.remote"
        - "bar.remote"

      volumes:
        - name: config-vol
          externalRef: app-config
        - name: secret-vol
          externalRef: app-secrets
        - name: data-vol
          externalRef: shared-data

      containers:
        container-1:
          image:
            repository: nginx
          command:
            - foo
          args:
            - bar
          envFrom:
            - externalRef: app-config
            - configMapRef:
                name: legacy-configmap
          volumeMounts:
            - name: config-vol
              path: /etc/app-config
            - name: secret-vol
              path: /etc/app-secrets
            - name: data-vol
              path: /data
          env:
            - name: "foo"
              value: "bar"
            - name: DATABASE_HOST
              externalServiceRef: ext-database
            - name: PARTNER_API_HOST
              externalServiceRef: partner-api
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  externalRef: app-secrets
                  key: secret-key
                  optional: true
            - name: CONFIG_VALUE
              valueFrom:
                configMapKeyRef:
                  externalRef: app-config
                  key: config-key
          envConfigMap:
            foo: bar
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            enabled: true
            # START ONLY EXECCOMMAND
            execCommand: ["/bin/true"]
            # END ONLY EXECCOMMAND

          readinessProbe:
            enabled: true
            # START ONLY EXECCOMMAND
            execCommand: ["/bin/true"]
            # END ONLY EXECCOMMAND

          startupProbe:
            enabled: true
            # START ONLY EXECCOMMAND
            execCommand: ["/bin/true"]
            # END ONLY EXECCOMMAND
        container-2:
          image:
            repository: nginx
            tag: "1.18"
          env:
            foo: bar
          configFiles:
            application.properties:
              format: "key=value"
              mountPath: /opt/application.properties
              content:
                key1: foo
                key2: bar
            application.properties2:
              format: "key=value"
              mountPath: /opt/application.properties
              secret: true
              content:
                key1: foo
                key2: bar
            appconfig.json:
              format: "json"
              mountPath: /opt/appconfig.json
              content:
                yaml1: val1
                yaml2: val2
                yaml3: val3
                yaml4:
                  subkey1: subval1
          binaryFiles:
            binaryFilename:
              mountPath: /opt/my-binary-license
              content: 'base64 encoded data'
            binaryFilename2:
              mountPath: /opt/my-binary-license
              content: 'base64 encoded data'
          resources: {}
      initContainers:
        init-container-1:
          image:
            repository: db-init
            tag: "latest"
          resources: {}
  component-2:
    # start common.service
    services:
      service-2:
        deploy: true
    # end common.service
    # start common.networkpolicy
    networkpolicies:
      networkpolicy-1:
        policyTypes:
          - Ingress
        ingress:
          ipBlock:
            cidr: 0.0.0.0/0
    # end common.networkpolicy
    controller:
      deploy: true
      type: "StatefulSet"

      envFrom:
        - externalRef: app-secrets

      extraVolumeClaimTemplates:
        - metadata:
            name: foobar
          spec:
            accessModes: ["ReadWriteOnce"]
            storageClassName: myStorageClass
            resources:
              requests:
                storage: 2Gi

      # volumes is a list of volumes to be created as secret or configMap
      volumes:
        # name of the volume
        - name: generic-name
          # type can either be "secret", "configMap" or "persistentVolumeClaim"
          type: "persistentVolumeClaim"
          # claimNameSuffix has to be the same as .pvcs.[].name
          claimNameSuffix: "name-of-pvc"
        - name: emptydir-volume
          type: "emptyDir"
          sizeLimit: 100Mi
        - name: secret-store
          type: "csi"
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "azure-kvname"
        - name: ext-config-vol
          externalRef: app-config

      hostAliases:
      - ip: "127.0.0.1"
        hostnames:
        - "foo.local"
        - "bar.local"
      - ip: "10.1.2.3"
        hostnames:
        - "foo.remote"
        - "bar.remote"
      containers:
        container-1:
          image:
            repository: nginx
            tag: "1.16"
          resources: {}
          volumeMounts:
            # name of the volume, same as in components.controller.volumes.name
            # path where the volume should be mounted
            # subPath is an optional path within the volume from which the container's volume should be mounted. Useful for single files instead of directories
            # readOnly mounted read-only if true, read-write otherwise (false or unspecified). Comment out for using default (false)
            # clearNamePrefix when true, only value of "name" is used, otherwise (and by default) the templated manifest is prefixed with "library.name".
            - name: generic-name
              path: /tmp/test1
              subPath: test1.yml
              # readOnly: true
              # clearNamePrefix: false
      initContainers:
        initcontainer-1:
          image:
            repository: nginx
            tag: "1.16"
          envSecret:
            foo: bar
          env:
            foobar: foobar
          resources: {}
          containerSecurityContext:
            enabled: true
            capabilities:
              # add: []
              drop:
              - ALL
            # readOnlyRootFilesystem: true
            # runAsGroup: 1001
            # runAsNonRoot: true
            # runAsUser: 1001
  component-3:
    # start common.service
    services:
      # specify the name of the service
      service-1:
        deploy: true
    # end common.service
    # start common.networkpolicy
    networkpolicies:
      networkpolicy-1:
        policyTypes:
          - Ingress
        ingress:
          ports:
          - protocol: TCP
            port: 8080
          - protocol: TCP
            port: 8081
    # end common.networkpolicy
    controller:
      deploy: true
      type: "Job"
      completions: 5
      completionMode: "Indexed"
      backoffLimit: 2
      activeDeadlineSeconds: 120
      ttlSecondsAfterFinished: 0
      automountServiceAccountToken: false
      restartPolicy: "Never"

      # podSecurityContext holds pod-level security attributes and common container settings.
      # Some fields are also present in container.securityContext. Field values of containerSecurityContext take precedence over field values of podSecurityContext.
      # ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
      podSecurityContext:
        enabled: true
        fsGroup: 2001
        runAsGroup: 1001
        runAsNonRoot: true
        runAsUser: 1001

      hostAliases:
      - ip: "127.0.0.1"
        hostnames:
        - "foo.local"
        - "bar.local"
      - ip: "10.1.2.3"
        hostnames:
        - "foo.remote"
        - "bar.remote"

      # start containers
      # dictionary of containers in a pod
      containers:
        job:
          image:
            repository: perl
            tag: "5.34.0"
          command: ["perl", "-Mbignum=bpi", "-wle", "print bpi(2000)"]
          containerSecurityContext:
            enabled: true
            capabilities:
              # add: []
              drop:
              - ALL
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000

          containerPorts:
            - name: "http"
              containerPort: 80

          resources:
            # We usually recommend not to specify default resources and to leave this as a conscious
            # choice for the user. This also increases chances charts run on environments with little
            # resources, such as Minikube. If you do want to specify resources, uncomment the following
            # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
            limits:
              cpu: 0
              memory: 0
            requests:
              cpu: 0
              memory: 0
      # end containers

  component-4:
    # start common.service
    services:
      # specify the name of the service
      service-1:
        deploy: false
    # end common.service

    controller:
      deploy: true
      type: "CronJob"
      restartPolicy: "OnFailure"
      schedule: "12 00 * * *"
      concurrencyPolicy: "Forbid"
      failedJobsHistoryLimit: 2
      podSecurityContext:
        enabled: true
        fsGroup: 2001
        runAsGroup: 1001
        runAsNonRoot: true
        runAsUser: 1001

      hostAliases:
      - ip: "127.0.0.1"
        hostnames:
        - "foo.local"
        - "bar.local"
      - ip: "10.1.2.3"
        hostnames:
        - "foo.remote"
        - "bar.remote"

      # start containers
      # dictionary of containers in a pod
      containers:
        job:
          image:
            repository: busybox
            tag: "1.28"
          command: ["/bin/sh", "-c", "date; echo Hello from the Kubernetes cluster"]
          containerSecurityContext:
            enabled: true
            capabilities:
              # add: []
              drop:
              - ALL
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000

          resources:
            # We usually recommend not to specify default resources and to leave this as a conscious
            # choice for the user. This also increases chances charts run on environments with little
            # resources, such as Minikube. If you do want to specify resources, uncomment the following
            # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
            limits:
              cpu: 0
              memory: 0
            requests:
              cpu: 0
              memory: 0
      # end containers
